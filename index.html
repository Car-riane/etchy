<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css"> 
  <script src="script.js" defer></script>
  <title>etchy-Sketch</title>
</head>
<body>
  <h1>etchySketch</h1>
  <div id="grid-container"></div>
  <button id="change-size" class="button-64" role="button"><span class="text">GRIDS</span></button>
  
  <div class="controls">
    <label class="button-64" for="color-picker">Colors</label>
    <input type="color" id="color-picker" value="#ffc0cb">
  </div>
  <button id="reset-grid" class="button-64" role="button"><span class="text">Reset</span></button>
</body>
</html>
